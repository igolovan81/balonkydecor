services:
  db:
    image: mysql:8.4
    container_name: balonkydecor_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: balonkydecor
      MYSQL_USER: balonky
      MYSQL_PASSWORD: balonky
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:
